name: Package Artifacts
on: [workflow_dispatch, workflow_call]
jobs:
  package-snapshot-artifacts:
    runs-on: ubuntu-latest
    if: github.ref != 'refs/heads/master'
    environment: staging
    outputs:
      final_name: ${{ steps.get-final-name.outputs.final_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive
      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "11"
          cache: maven
      - name: Enforce Snapshot Versioning
        id: set-version
        run: |
          BASE_VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
          BASE_VERSION=${BASE_VERSION%-SNAPSHOT}

          VERSION="${BASE_VERSION}-SNAPSHOT"

          echo "Using version: $VERSION"
          mvn versions:set -DnewVersion=$VERSION -DgenerateBackupPoms=false
      - name: Package
        run: mvn clean package
      - name: Get Final Artifact Names
        id: get-final-name
        run: |
          FINAL_NAME=$(mvn help:evaluate -Dexpression=project.build.finalName -q -DforceStdout)
          echo "final_name=$FINAL_NAME" >> $GITHUB_OUTPUT
      - name: Upload Artifacts
        uses: actions/upload-artifact@v6
        with:
          name: kakasi2-artifacts
          path: |
            target/${{ steps.get-final-name.outputs.final_name }}.jar
            target/${{ steps.get-final-name.outputs.final_name }}-sources.jar
            target/${{ steps.get-final-name.outputs.final_name }}-javadoc.jar
            pom.xml

  package-artifacts:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master'
    environment: production
    outputs:
      final_name: ${{ steps.get-final-name.outputs.final_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive
      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "11"
          cache: maven
      - name: Package
        run: mvn clean package
      - name: Get Final Artifact Names
        id: get-final-name
        run: |
          FINAL_NAME=$(mvn help:evaluate -Dexpression=project.build.finalName -q -DforceStdout)
          echo "final_name=$FINAL_NAME" >> $GITHUB_OUTPUT
      - name: Upload Artifacts
        uses: actions/upload-artifact@v6
        with:
          name: kakasi2-artifacts
          path: |
            target/${{ steps.get-final-name.outputs.final_name }}.jar
            target/${{ steps.get-final-name.outputs.final_name }}-sources.jar
            target/${{ steps.get-final-name.outputs.final_name }}-javadoc.jar
            pom.xml
